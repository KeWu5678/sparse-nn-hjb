# @package _global_
# penaltypowers experiment: signed/finite-step PDAP penalty-power sweep.
# The fixed settings live here; Make owns the Hydra multirun sweep axes:
# data, homogeneous activation, power, gamma, and loss weights.

name: penaltypowers

model:
  kind: signed
  insertion: finite_step
  activation: relu
  power: 2.0
  loss_weights: [1.0, 1.0]
  alpha: 1e-5

training:
  num_iterations: 10
  num_insertion: 50
  max_insert: 15
  prune_amp_tol: 1e-8
  lr: 1.0
  method: levenberg_marquardt
  max_ls_iter: 500
  tolerance_ls: 1.00000001
  tolerance_grad: 0.0
  sigmamax: 10.0
  fit_outer_iterations: 20
  display_every: 2
  ins_merge_tol: 1e-2
  lbfgs_lr: 1e-2
  lbfgs_steps: 200
  newton_tol: 1e-12
  newton_max_iter: 50
